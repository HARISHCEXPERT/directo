<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Welcome to Directo</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    body { width: 100%; max-width: 480px; padding: 24px; }
    .big-logo { width: 56px; height: 56px; font-size: 28px; border-radius: 14px; margin-bottom: 16px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: #a1a1aa; font-size: 13px; line-height: 1.5; margin-bottom: 16px; }
    .next-btn { background: linear-gradient(135deg, #8b5cf6, #7c3aed); border: 0; color: #fff; font-weight: 600; padding: 12px 20px; border-radius: 10px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="logo big-logo">D</div>
  <h1>Welcome to Directo 🚀</h1>
  <p>This extension auto-fills SaaS directory submission forms with your product details — so you launch 10x faster.</p>
  <p><strong>Next:</strong> Click the Directo icon in your browser toolbar, then connect your account using the token from the Directo dashboard.</p>
  <button class="next-btn" onclick="window.open('http://localhost:3000/dashboard/extension', '_blank')">Open Directo dashboard →</button>
</body>
</html>
